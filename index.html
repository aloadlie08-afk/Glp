<!DOCTYPE html>
<html lang="en" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OKX Pro | GLP Trading</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <style>
        :root { --okx-black: #000000; --okx-gray: #1a1a1a; --okx-blue: #0052ff; --okx-text: #ffffff; }
        body { background-color: var(--okx-black); color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        
        #auth-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--okx-black); z-index: 2000; display: flex; justify-content: center; align-items: center;
        }
        .auth-card {
            background: var(--okx-gray); padding: 40px; border-radius: 16px; width: 350px; text-align: center;
            border: 1px solid #333;
        }
        input {
            width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #444;
            color: white; border-radius: 8px; box-sizing: border-box;
        }
        .btn-main {
            width: 100%; padding: 12px; background: white; color: black; border: none;
            border-radius: 25px; font-weight: bold; cursor: pointer; margin-top: 15px;
        }
        .toggle-link { color: #888; font-size: 13px; cursor: pointer; display: block; margin-top: 15px; }

        #dashboard { display: none; }
        nav { height: 60px; border-bottom: 1px solid #333; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
        .main-grid { display: grid; grid-template-columns: 1fr 300px; height: calc(100vh - 60px); }
        
        @media (max-width: 768px) {
            .main-grid { grid-template-columns: 1fr; }
            #tv_analysis { display: none; }
        }
    </style>
</head>
<body>

<div id="auth-container">
    <div class="auth-card">
        <h2 id="auth-title">Log In</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button class="btn-main" id="auth-btn" onclick="handleAuth()">Continue</button>
        <span class="toggle-link" id="toggle-auth" onclick="toggleMode()">Don't have an account? Sign Up</span>
    </div>
</div>

<div id="dashboard">
    <nav>
        <div style="display:flex; gap:20px; align-items:center;">
            <b style="font-size:22px;">OKX <span style="font-weight:100">GLP</span></b>
            <select id="lang-select" onchange="changeLang(this.value)" style="background:#222; color:white; border:1px solid #444; padding:5px; border-radius:5px;">
                <option value="en">English</option>
                <option value="ar">العربية</option>
                <option value="tr">Türkçe</option>
            </select>
        </div>
        <button onclick="logout()" id="logout-btn" style="background:none; border:1px solid #444; color:white; cursor:pointer; padding:5px 15px; border-radius:15px;">Logout</button>
    </nav>
    <div class="main-grid">
        <div id="tv_chart" style="height: 100%;"></div>
        <div id="tv_analysis" style="border-left:1px solid #333; height: 100%;"></div>
    </div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>

    let isSignUp = false;
    let currentLang = 'en';

    function toggleMode() {
        isSignUp = !isSignUp;
        updateAuthUI();
    }

    function updateAuthUI() {
        const t = translations[currentLang];
        document.getElementById('auth-title').innerText = isSignUp ? t.signup : t.login;
        document.getElementById('toggle-auth').innerText = isSignUp ? t.toggleLogin : t.toggleSignup;
        document.getElementById('auth-btn').innerText = isSignUp ? t.signup : t.login;
    }

    function changeLang(lang) {
        currentLang = lang;
        document.getElementById('main-html').dir = translations[lang].dir;
        document.getElementById('logout-btn').innerText = translations[lang].logout;
        updateAuthUI();
        if (firebase.auth().currentUser) {
            loadCharts(); // إعادة تحميل الشارت باللغة الجديدة
        }
    }

    async function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        if(!email || !pass) return alert("Please fill all fields");
        
        try {
            if (isSignUp) {
                await firebase.auth().createUserWithEmailAndPassword(email, pass);
                alert("Account Created successfully!");
            } else {
                await firebase.auth().signInWithEmailAndPassword(email, pass);
            }
        } catch (error) {
            alert(error.message);
        }
    }

    firebase.auth().onAuthStateChanged(user => {
        if (user) {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadCharts();
        } else {
            document.getElementById('auth-container').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'none';
        }
    });
